<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout (~{::content})}">
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="hero-section animate-fade-in">
                <i class="bi bi-exclamation-triangle" style="font-size: 5rem; color: #ffc107;"></i>
                <h1 class="display-1 text-warning mt-3">404</h1>
                <h2 class="mb-4">Page Not Found</h2>
                <p class="lead mb-4">The page you're looking for doesn't exist.</p>
                <p class="text-muted mb-4">
                    It might have been moved, deleted, or you entered the wrong URL. 
                    Let's get you back on track!
                </p>
                <div class="d-flex gap-2 justify-content-center flex-wrap">
                    <a href="/" class="btn btn-primary">
                        <i class="bi bi-house"></i> Go to Home
                    </a>
                    <a href="/about" class="btn btn-secondary">
                        <i class="bi bi-info-circle"></i> About Us
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
