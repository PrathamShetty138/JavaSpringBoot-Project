<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout (~{::content})}">
<body>
<div th:fragment="content">
    <div class="row justify-content-center align-items-center" style="min-height: 75vh;">
        <div class="col-md-7 col-lg-6 col-xl-5">
            <div class="animate-fade-in" style="background: white; border-radius: 30px; padding: 60px 50px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); position: relative; overflow: hidden;">
                
                <!-- Decorative gradient circle -->
                <div style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; opacity: 0.1;"></div>
                
                <div style="position: relative; z-index: 1;">
                    <!-- Icon and Title -->
                    <div class="text-center mb-5">
                        <div style="display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3); margin-bottom: 25px;">
                            <i class="bi bi-box-arrow-in-right" style="font-size: 3.5rem; color: white;"></i>
                        </div>
                        <h1 style="color: #2d3748; font-weight: 700; margin-bottom: 12px; font-size: 2.2rem;">Welcome Back!</h1>
                        <p style="color: #718096; font-size: 1.1rem;">Sign in to continue to Campus Events</p>
                    </div>
                    
                    <!-- Success Message -->
                    <div th:if="${param.registered}" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(67, 233, 123, 0.3);">
                        <i class="bi bi-check-circle-fill"></i> Registration successful! Please login.
                    </div>
                    
                    <!-- Error Message -->
                    <div th:if="${error}" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(240, 147, 251, 0.3);" th:text="${error}">
                        Invalid credentials
                    </div>
                    
                    <!-- Login Form -->
                    <form th:action="@{/login}" method="post">
                        <div class="mb-4">
                            <label for="username" style="color: #4a5568; font-weight: 600; margin-bottom: 10px; display: block; font-size: 1.05rem;">
                                <i class="bi bi-envelope" style="color: #667eea; font-size: 1.1rem;"></i> Email Address
                            </label>
                            <input type="email" class="form-control" id="username" name="username" 
                                   placeholder="Enter your email" required
                                   style="padding: 16px 20px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 1.05rem; transition: all 0.3s;"
                                   onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 4px rgba(102, 126, 234, 0.1)'"
                                   onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none'">
                        </div>
                        
                        <div class="mb-5">
                            <label for="password" style="color: #4a5568; font-weight: 600; margin-bottom: 10px; display: block; font-size: 1.05rem;">
                                <i class="bi bi-lock-fill" style="color: #667eea; font-size: 1.1rem;"></i> Password
                            </label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="Enter your password" required
                                   style="padding: 16px 20px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 1.05rem; transition: all 0.3s;"
                                   onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 4px rgba(102, 126, 234, 0.1)'"
                                   onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none'">
                        </div>
                        
                        <button type="submit" class="btn w-100" 
                                style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 600; font-size: 1.1rem; box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); transition: all 0.3s; margin-bottom: 25px;"
                                onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 12px 30px rgba(102, 126, 234, 0.5)'"
                                onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 8px 20px rgba(102, 126, 234, 0.4)'">
                            <i class="bi bi-box-arrow-in-right"></i> Sign In
                        </button>
                    </form>
                    
                    <!-- Divider -->
                    <div style="text-align: center; margin: 25px 0; position: relative;">
                        <span style="background: white; padding: 0 15px; color: #a0aec0; font-size: 0.9rem; position: relative; z-index: 1;">or</span>
                        <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e2e8f0; z-index: 0;"></div>
                    </div>
                    
                    <!-- Register Link -->
                    <div class="text-center">
                        <p style="color: #718096; margin-bottom: 0; font-size: 1.05rem;">Don't have an account? 
                            <a href="/register" style="color: #667eea; font-weight: 700; text-decoration: none; transition: all 0.3s; font-size: 1.05rem;"
                               onmouseover="this.style.color='#764ba2'"
                               onmouseout="this.style.color='#667eea'">
                                Create one here →
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
