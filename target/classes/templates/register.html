<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout (~{::content})}">
<body>
<div th:fragment="content">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-6 col-lg-5">
            <div class="animate-fade-in" style="background: white; border-radius: 25px; padding: 50px 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); position: relative; overflow: hidden;">
                
                <!-- Decorative gradient circles -->
                <div style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; opacity: 0.1;"></div>
                <div style="position: absolute; bottom: -30px; left: -30px; width: 100px; height: 100px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 50%; opacity: 0.1;"></div>
                
                <div style="position: relative; z-index: 1;">
                    <!-- Icon and Title -->
                    <div class="text-center mb-4">
                        <div style="display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3); margin-bottom: 20px;">
                            <i class="bi bi-person-plus" style="font-size: 3rem; color: white;"></i>
                        </div>
                        <h2 style="color: #2d3748; font-weight: 700; margin-bottom: 8px;">Join Campus Events</h2>
                        <p style="color: #718096; font-size: 1rem;">Create your account to get started</p>
                    </div>
                    
                    <!-- Error Message -->
                    <div th:if="${error}" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(240, 147, 251, 0.3);" th:text="${error}">
                        Error
                    </div>
                    
                    <!-- Register Form -->
                    <form th:action="@{/register}" method="post" th:object="${user}">
                        <div class="mb-3">
                            <label for="name" style="color: #4a5568; font-weight: 600; margin-bottom: 8px; display: block;">
                                <i class="bi bi-person" style="color: #667eea;"></i> Full Name
                            </label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" 
                                   placeholder="Enter your full name" required
                                   style="padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: all 0.3s;"
                                   onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                                   onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none'">
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" style="color: #4a5568; font-weight: 600; margin-bottom: 8px; display: block;">
                                <i class="bi bi-envelope" style="color: #667eea;"></i> Email Address
                            </label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" 
                                   placeholder="Enter your email" required
                                   style="padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: all 0.3s;"
                                   onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                                   onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none'">
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" style="color: #4a5568; font-weight: 600; margin-bottom: 8px; display: block;">
                                <i class="bi bi-lock-fill" style="color: #667eea;"></i> Password
                            </label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" 
                                   placeholder="Create a password (min 6 characters)" required
                                   style="padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: all 0.3s;"
                                   onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                                   onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none'">
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="confirmPassword" style="color: #4a5568; font-weight: 600; margin-bottom: 8px; display: block;">
                                <i class="bi bi-shield-check" style="color: #667eea;"></i> Confirm Password
                            </label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                                   placeholder="Confirm your password" required
                                   style="padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: all 0.3s;"
                                   onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                                   onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none'">
                        </div>
                        
                        <button type="submit" class="btn w-100" 
                                style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 1.05rem; box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); transition: all 0.3s; margin-bottom: 20px;"
                                onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 12px 30px rgba(102, 126, 234, 0.5)'"
                                onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 8px 20px rgba(102, 126, 234, 0.4)'">
                            <i class="bi bi-person-plus"></i> Create Account
                        </button>
                    </form>
                    
                    <!-- Divider -->
                    <div style="text-align: center; margin: 25px 0; position: relative;">
                        <span style="background: white; padding: 0 15px; color: #a0aec0; font-size: 0.9rem; position: relative; z-index: 1;">or</span>
                        <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e2e8f0; z-index: 0;"></div>
                    </div>
                    
                    <!-- Login Link -->
                    <div class="text-center">
                        <p style="color: #718096; margin-bottom: 0;">Already have an account? 
                            <a href="/login" style="color: #667eea; font-weight: 700; text-decoration: none; transition: all 0.3s;"
                               onmouseover="this.style.color='#764ba2'"
                               onmouseout="this.style.color='#667eea'">
                                Sign in here →
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
